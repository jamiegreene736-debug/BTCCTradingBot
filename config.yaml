# Bitunix TraderBot — aggressive multi-symbol futures.
# 100% technical. No news / sentiment inputs are used.

mode: live               # paper | live  (paper never sends orders)

trading:
  symbols:               # universe — bot evaluates and trades each independently
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - XRPUSDT
  timeframe: 1m          # 1m / 5m / 15m / 30m / 1h / 2h / 4h
  leverage: 25           # 25x — pro scalper sweet spot. NOTE on misconception:
                         # lowering leverage does NOT cut fees. Fees scale with
                         # NOTIONAL (= risk_per_trade / sl_pct), which is
                         # leverage-independent at fixed risk. A trade at 50x
                         # and 25x with 1% risk + 0.25% SL has IDENTICAL notional
                         # (~$184 on $46) and IDENTICAL round-trip fees ($0.31).
                         #
                         # What leverage DOES change is liquidation distance:
                         #   100x → 1% adverse = liq
                         #    50x → 2% adverse = liq
                         #    25x → 4% adverse = liq   ← sweet spot
                         #    10x → 10% adverse = liq
                         #
                         # With 0.25% SL we're never near liq in normal flow,
                         # but flash wicks / oracle delays can momentarily skip
                         # the SL trigger — bigger buffer = real protection.
                         # 25x supports 4 concurrent positions on $46 (margin
                         # use ~$22, ~50% buffer left). Bitunix per-symbol caps
                         # (BTC 200x, ETH 100x, SOL/XRP 75x) all permit 25x.
  margin_coin: USDT
  margin_mode: ISOLATION # ISOLATION isolates loss per position; CROSS shares margin
  risk_per_trade_pct: 1.0
  max_open_positions: 4         # global cap; total across all symbols
  max_positions_per_symbol: 1   # never pyramid into the same trade
  max_same_direction: 2         # max concurrent LONGs (or SHORTs) — anti-correlation
  cooldown_seconds: 60          # min seconds between trades on same symbol
  # Force-close stale positions. Trades that sit in a range for hours are
  # dead capital paying funding fees. 90 min is the industry norm for 1m
  # scalping — long enough that valid TP setups still resolve, short
  # enough to free up slots and avoid range-bound dead trades.
  max_position_age_seconds: 5400
  # Profit-aware time exit: when max age hits, ONLY force-close if the
  # position is at a loss. Winners keep running under the SL ratchet —
  # a winning trade that's been alive 90+ min has already proven the
  # signal was right; we want to harvest more. The SL ratchet (already
  # at break-even or trailing by then) protects the downside.
  time_exit_only_if_losing: true
  # Streak protection: pause a symbol for streak_loss_pause_seconds after
  # N consecutive losses. Live data showed 6 XRP SHORTs in a row losing —
  # bot kept doubling down on a wrong-regime call. This catches it.
  streak_loss_limit: 3
  streak_loss_pause_seconds: 7200    # 2 hours
  # Daily drawdown circuit breaker — halts NEW entries for the rest of the
  # UTC day if equity drops more than this % from session start. Existing
  # positions still managed (SL ratchet, time-exit). Resets at UTC midnight.
  max_daily_dd_pct: 8.0
  # Spread filter — reject signals when (ask-bid)/mid exceeds this %.
  # At 50x with 0.25% SL, a 0.05% adverse spread eats 20% of risk budget
  # on entry alone. Wide spreads = bad time to enter.
  max_entry_spread_pct: 0.05
  # Post-only maker entries: place a LIMIT order at top-of-book with
  # POST_ONLY effect, save ~0.04% per round-trip in fees vs taker market.
  # If the order doesn't fill in post_only_timeout_secs (because price ran
  # away from us), cancel and place MARKET as fallback so we don't miss
  # the move.
  use_post_only_entries: true
  post_only_timeout_secs: 8

risk:
  # STOP LOSS — % of entry price.
  # Widened from 0.25% → 0.40% as a structural fee reduction. Math:
  #   notional = risk / sl_pct, fee = fee_pct × notional.
  #   Halving sl_pct doubles notional, doubling fees per trade.
  #   Going from 0.25% → 0.40% SL cuts notional from $184 → $115 on $46
  #   account at 1% risk, dropping per-trade fees from $0.31 → $0.15.
  #   Round-trip fee as % of risk budget: was 67%, now 33%. Big win.
  # Also: 0.25% was inside typical 1m ATR for ETH/SOL/XRP, getting stopped
  # out on bar-internal noise. 0.40% sits cleanly outside chop bands.
  stop_loss_pct: 0.40
  # TAKE PROFIT — R-multiple of SL distance.
  # 2.5R kept (drops breakeven from ~75% at 1.5R to ~38% at 0.40%×2.5R after
  # maker fees). With wider SL the TP target in price terms becomes 1.00%
  # (was 0.625%) — still well within typical 1m directional moves on alts.
  # Adaptive TP ladder still tightens over time (5/10/20/40-min tiers) so
  # flat trades settle at the 0.7R fee-aware floor rather than time-exiting.
  take_profit_r: 2.5
  # ATR-aware SL hybrid. When use_atr=true, SL distance is the MAX of the
  # fixed `stop_loss_pct` floor and `atr_multiplier_sl × ATR%`. In calm
  # markets the floor binds (tight SL); in vol expansion ATR binds and
  # widens the stop so we don't get wicked out by the regime that just
  # changed. Risk-per-trade stays constant; notional auto-adjusts.
  use_atr: true
  atr_multiplier_sl: 1.2    # k × ATR% = SL pct in vol regimes
  atr_multiplier_tp: 4.0    # legacy; TP now derives from effective SL × take_profit_r
  # Dynamic SL — once price moves in your favor, ratchet the SL forward to
  # lock in profit. The "give-back" killer for high-leverage scalping.
  #
  # At +1R favorable: SL moves to entry + buffer (trade becomes "free").
  # At +1.5R favorable: SL starts trailing 0.5R behind current price.
  #
  # Example at 50x leverage, 0.25% SL:
  #   Price moves +1.0% favorable (4R) → SL trails at +0.75% (3R) → locks +37.5% margin.
  breakeven_at_r: 1.0
  breakeven_buffer_pct: 0.05    # tiny cushion above entry to cover round-trip fees
  trailing_activate_r: 1.5
  trailing_distance_r: 0.5
  # Round-trip fee + slippage estimate as % of notional. With maker entries
  # (post-only LIMIT at top of book) most fills are maker (~0.04% per side
  # vs ~0.06% taker), some fall back to market. Blended estimate:
  #   0.7 × maker_round_trip + 0.3 × taker_round_trip + slippage
  #   ≈ 0.7 × 0.10% + 0.3 × 0.13% + 0.04% ≈ 0.15%
  # The bot guarantees TP will always be at least adaptive_tp_floor_r × SL
  # distance which exceeds this fee buffer, so winning trades ALWAYS net.
  round_trip_fee_pct: 0.15
  # Adaptive TP — as a position ages without hitting the original target,
  # tighten the TP progressively. We always aim for profit (TP stays above
  # fee floor), but accept smaller wins on flat trades rather than letting
  # them time-exit at a loss. Tier ladder is hard-coded in risk.py.
  adaptive_tp_enabled: true
  adaptive_tp_floor_r: 0.7      # minimum profitable TP after fees
  # Partial TP at +1R — close 50% of position when SL ratchets to break-even.
  # Locks in a fee-clearing profit on half the position, lets the runner ride
  # to the full 2.5R target. Standard "scale-out + runner" technique that pro
  # scalpers use to raise effective win rate without giving up R-multiple.
  partial_tp_enabled: true
  partial_tp_at_r: 1.0
  partial_tp_close_pct: 50.0

strategy:
  # 23 indicator votes + 30 patterns + 5 combo recipes. The combined score
  # gate is `fire_threshold` below — the single tunable for selectivity.
  ema_fast: 9
  ema_mid:  21
  ema_slow: 50
  rsi_period: 14
  # Tighter windows: avoid late-cycle entries near overbought/oversold.
  rsi_long_min: 45
  rsi_long_max: 60       # was 70 — RSI > 60 = late in long move, prone to fade
  rsi_short_min: 40      # was 30 — RSI < 40 = late in short move
  rsi_short_max: 55
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2.0
  atr_period: 14
  # ADX trend strength — now a COUNTED indicator, not a hard gate. ADX above
  # this threshold votes for whichever side has the most other agreement.
  adx_period: 14
  adx_min: 18.0
  # Supertrend regime filter (direction-aware; counted)
  supertrend_period: 10
  supertrend_mult: 3.0
  # Volume confirmation — vote for whichever side wins when volume > multiplier × MA.
  volume_ma_period: 20
  volume_spike_multiplier: 1.5
  # Stochastic RSI — sensitive momentum oscillator (Stoch applied to RSI values).
  # Bull cross (%K > %D) outside overbought = long; bear cross outside oversold = short.
  stoch_rsi_period: 14
  stoch_rsi_k: 3
  stoch_rsi_d: 3
  # Higher-timeframe trend confirmation — vote for direction of the HTF trend.
  # Compares last close of HTF candles against EMA on that timeframe.
  htf_timeframe: 15m
  htf_ema_period: 50
  # Funding rate (perp futures) — contrarian: high positive funding = crowded
  # longs = vote SHORT (taking the unfavored side). Bitunix returns per-interval
  # rate (typically 8h), so 0.0005 = 0.05%/8h = elevated crowded-longs zone.
  funding_threshold: 0.0005
  # Support/Resistance — find swing highs/lows in recent klines, cluster nearby
  # swings into horizontal levels, then vote on bounce off support / rejection
  # at resistance. swing_lookback=5 means 5 bars on each side confirm a swing.
  swing_lookback: 5
  sr_cluster_tol_pct: 0.3
  sr_min_touches: 2
  sr_proximity_pct: 0.3
  # Order book imbalance — live WebSocket depth feed, top-N bid/ask volume.
  # imbalance = (bid_vol - ask_vol) / total. >threshold → bid pressure (long);
  # <-threshold → ask pressure (short).
  ob_depth_levels: 10
  ob_imbalance_threshold: 0.30
  # Money Flow Index (volume-weighted RSI). Looser windows than RSI since
  # MFI is naturally smoother. Long if MFI < 60; short if > 40.
  mfi_period: 14
  mfi_long_max: 60.0
  mfi_short_min: 40.0
  # TTM Squeeze — Bollinger Bands inside Keltner Channels = compression.
  # When the squeeze RELEASES (BB exits Keltner), we vote in the direction
  # of the most recent close vs the Keltner midline.
  keltner_period: 20
  keltner_atr_multiplier: 1.5
  # BTC leader: alts shouldn't fight BTC. Vote 22 fires when alt signal
  # direction agrees with BTC's 1m EMA-trend direction.
  btc_leader_symbol: BTCUSDT
  btc_leader_ema: 21
  # Pattern recognition + indicators are the entire decision.
  # combined = pattern_weight * pattern + (1 - pattern_weight) * indicator
  # fire if combined >= fire_threshold AND that side wins.
  pattern_weight: 0.55
  pattern_norm: 2.0      # 2 mid-strength patterns = saturation
  # Tightened to 0.50 after reviewing 24-trade live results: the previous
  # 0.30 threshold produced ~3 trades/hour with 17% win rate. Most losses
  # were time-exits on weak signals oscillating in chop. At 0.50 we require
  # genuine consensus — either 2+ strong patterns OR ~12 of 23 indicators
  # OR a mid pattern + strong indicator confluence. Fewer trades, higher
  # conviction, less fee drag.
  fire_threshold: 0.50

loop:
  tick_seconds: 10
  kline_lookback: 200

logging:
  level: INFO
  file: logs/bot.log
