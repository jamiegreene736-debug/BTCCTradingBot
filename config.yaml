# Bitunix TraderBot — aggressive multi-symbol futures.
# 100% technical. No news / sentiment inputs are used.

mode: live               # paper | live  (paper never sends orders)

trading:
  symbols:               # universe — bot evaluates and trades each independently
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
    - XRPUSDT
  timeframe: 1m          # 1m / 5m / 15m / 30m / 1h / 2h / 4h
  leverage: 100          # Bitunix max is 200 on BTCUSDT, less on others
  margin_coin: USDT
  margin_mode: ISOLATION # ISOLATION isolates loss per position; CROSS shares margin
  risk_per_trade_pct: 1.0
  max_open_positions: 4         # global cap; total across all symbols
  max_positions_per_symbol: 1   # never pyramid into the same trade
  cooldown_seconds: 60          # min seconds between trades on same symbol
  max_position_age_seconds: 900 # 15min: force-close stale positions (0 disables)

risk:
  # CONSERVATIVE stop loss — tight, in % of entry price.
  stop_loss_pct: 0.25    # 0.25% price move = full SL at leverage
  # AGGRESSIVE take profit — multiple of SL distance (R-multiple).
  take_profit_r: 5.0     # TP at 5x SL distance = 1.25% price move
  use_atr: false
  atr_multiplier_sl: 0.8
  atr_multiplier_tp: 4.0

strategy:
  # 5-rule confluence; min_confluence is how many must agree to fire.
  ema_fast: 9
  ema_mid:  21
  ema_slow: 50
  rsi_period: 14
  rsi_long_min: 45
  rsi_long_max: 70
  rsi_short_min: 30
  rsi_short_max: 55
  macd_fast: 12
  macd_slow: 26
  macd_signal: 9
  bb_period: 20
  bb_std: 2.0
  atr_period: 14
  # ADX trend-strength filter (whipsaw killer; counts for whichever side wins)
  adx_period: 14
  adx_min: 22.0
  # Supertrend regime filter (direction-aware)
  supertrend_period: 10
  supertrend_mult: 3.0
  min_confluence: 3      # of 6 confluence rules; ADX is a hard gate (not counted).
                         # 3-of-6 = aggressive; 4-of-6 = selective; 5+ = rare

loop:
  tick_seconds: 10
  kline_lookback: 200

logging:
  level: INFO
  file: logs/bot.log
